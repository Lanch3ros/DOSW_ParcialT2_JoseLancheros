spring:
  application:
    name: DOSW-ParcialT2

  datasource:
    url: jdbc:postgresql://localhost:5432/doswdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: tu_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

logging:
  level:
    edu.dosw.parcial: DEBUG
    org.springframework.security: INFO
