spring:
  application:
    name: DOSW-ParcialT2

  datasource:
    url: jdbc:postgresql://localhost:5432/doswdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: "dosw-ecixpress-secret-key-must-be-at-least-256-bits-long-for-hs256"
  expiration: 86400000 # 24 horas en milisegundos

server:
  port: 8081

logging:
  level:
    edu.dosw.parcial: DEBUG
    org.springframework.security: INFO
