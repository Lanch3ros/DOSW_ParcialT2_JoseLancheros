spring:
  application:
    name: DOSW-ParcialT2

  # ----------------------------------------------------------------
  # Base de datos - H2 (desarrollo local / en memoria)
  # Cambiar la configuración de PostgreSQL cuando tenga la BD lista
  # ----------------------------------------------------------------
  datasource:
    url: jdbc:h2:mem:doswdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Consola H2 (accesible en http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

  # ----------------------------------------------------------------
  # Base de datos - PostgreSQL (producción)
  # Descomentar y completar cuando tenga PostgreSQL configurado
  # ----------------------------------------------------------------
  # datasource:
  #   url: jdbc:postgresql://localhost:5432/doswdb
  #   driver-class-name: org.postgresql.Driver
  #   username: postgres
  #   password: tu_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        # Para PostgreSQL usar: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081

logging:
  level:
    edu.dosw.parcial: DEBUG
    org.springframework.security: INFO
