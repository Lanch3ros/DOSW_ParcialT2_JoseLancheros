services:
  postgres:
    image: postgres:16
    container_name: ecixpress-db
    environment:
      POSTGRES_DB: doswdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ecixpress_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ecixpress_data:
